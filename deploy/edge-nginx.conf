worker_processes auto;
pid /run/edge-nginx.pid;
error_log /var/log/nginx/edge-error.log warn;

events {
    worker_connections 256;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;
    keepalive_timeout 65;

    access_log /var/log/nginx/edge-access.log;

    upstream python_backend {
        server 127.0.0.1:8000;
    }

    upstream cloud_backend {
        server 127.0.0.1:3001;
    }

    server {
        listen 3000;
        server_name _;

        client_max_body_size 200M;

        root /opt/edge-service/ppe-ui/build;
        index index.html;

        # --- Cloud API (Gemini / OpenRouter) → port 3001 ---
        location ~ ^/api/analyze {
            proxy_pass http://cloud_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
        }

        # --- WebSocket for RTSP live streaming → port 8000 ---
        location /ws/ {
            proxy_pass http://python_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
            proxy_buffering off;
            proxy_buffer_size 8k;
        }

        # --- Python backend API → port 8000 ---
        location /api/ {
            proxy_pass http://python_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
        }

        location /detect/ {
            proxy_pass http://python_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 300s;
        }

        location /videos/ {
            proxy_pass http://python_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 300s;
        }

        location /alarms/ {
            proxy_pass http://python_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location = /health {
            proxy_pass http://python_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # --- React SPA: serve static, fallback to index.html ---
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Never cache index.html so deploys take effect immediately
        location = /index.html {
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }
    }
}
